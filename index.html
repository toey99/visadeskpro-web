<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisaDesk Pro | Enterprise Portal</title>
    <style>
        /* ตั้งค่าพื้นฐาน (ธาตุทอง + น้ำ) */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e2e8f0; /* สีเทาโลหะ สื่อถึงความเป็นระบบ/ความปลอดภัย */
            color: #2d3748;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* กล่อง Login */
        .login-container {
            background-color: #ffffff;
            padding: 40px 50px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid #2b6cb0; /* ธาตุน้ำสีน้ำเงินเข้ม สื่อถึงปัญญาและเทคโนโลยี */
        }

        /* โลโก้ */
        .logo {
            text-align: center;
            font-size: 26px;
            font-weight: 700;
            color: #2b6cb0;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }
        
        .logo span {
            color: #718096;
            font-weight: 400;
        }

        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #a0aec0;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ฟอร์มกรอกข้อมูล */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #2b6cb0;
        }

        /* ปุ่ม Login */
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #2b6cb0;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #2c5282;
        }

        /* ส่วนเสริมด้านล่าง */
        .footer-links {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }

        .footer-links a {
            color: #718096;
            text-decoration: none;
        }

        .footer-links a:hover {
            color: #2b6cb0;
        }

        /* ป้ายเตือนความปลอดภัย */
        .security-badge {
            margin-top: 30px;
            text-align: center;
            font-size: 11px;
            color: #a0aec0;
            background-color: #f7fafc;
            padding: 10px;
            border-radius: 4px;
            border: 1px dashed #e2e8f0;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">VisaDesk <span>PRO</span></div>
        <div class="subtitle">Enterprise ERP Portal</div>

        <form action="#" method="POST">
            <div class="input-group">
                <label for="email">Agency / Partner Email</label>
                <input type="email" id="email" name="email" placeholder="partner@agency.com" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="login-btn">Secure Login</button>
        </form>

        <div class="footer-links">
            <a href="#">Forgot Password?</a>
            <a href="#">Request Access</a>
        </div>

        <div class="security-badge">
            🔒 Authorized Personnel Only. All activities are monitored.
        </div>
    </div>

</body>
</html>
